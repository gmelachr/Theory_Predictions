          - { q2_min: 20.0, q2_max: 21.0 }
          - { q2_min: 21.0, q2_max: 22.0 }
  - name: Bplus-to-Kplus-mu-mu
    global_options:
      tag: GvDV2020
    observables:
      - name: B->Kll::BR;l=mu,q=u
        kinematics: [{ q2_min: 1.1, q2_max: 2.0 }, { q2_min: 2.0, q2_max: 3.0 }, { q2_min: 3.0, q2_max: 4.0 }, { q2_min: 4.0, q2_max: 5.0 },
