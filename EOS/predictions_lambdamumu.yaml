    global_options:
      tag: GvDV2020
    observables:
      - name: Lambda_b->Lambdall::dBR/dq2@LargeRecoil;l=mu
        kinematics: [ { q2:  0.15 }, { q2:  0.50 }, { q2:  0.75 }, { q2:  1.0  }, { q2:  1.5  }, { q2:  2.0  }, { q2:  2.5  },
