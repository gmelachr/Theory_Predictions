likelihoods:
  - name: Lambdab-to-Lambda-FF-DM2016
    constraints:
      - 'Lambda_b->Lambdamu^+mu^-::BR[15.0,20.0]@BMvD:2019A'

posteriors:
  - name: Lambdab-to-Lambda-FF-DM2016
    global_options:
      model: WET
      form-factors: DM2016
    prior:
      - Lambdab-to-Lambda-FF-DM2016
    likelihood:
      - Lambdab-to-Lambda-FF-DM2016
  - name: SM
    prior:
      - SM
    likelihood: []

predictions:
